<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- Sidebar -->

        <aside class="sidebar">

    <!-- Logo -->

    <div class="logo">

        <i class="fa-solid fa-music"></i>

        <div>

            <h2>Melody Fun</h2>

            <p>Feel the Music</p>

        </div>

    </div>

    <!-- Playlist -->

    <div class="playlist">

        <h3>Playlist</h3>

        <ul class="song-list">

            <li class="song active">

                <img src="/images/cover1.jpg"
                     alt="cover">

                <div class="song-info">

                    <h4>Blinding Lights</h4>

                    <p>The Weeknd</p>

                </div>

            </li>

            <li class="song">

                <img src="/images/cover2.jpg"
                     alt="cover">

                <div class="song-info">

                    <h4>Perfect</h4>

                    <p>Ed Sheeran</p>

                </div>

            </li>

            <li class="song">

                <img src="/images/cover3.jpg"
                     alt="cover">

                <div class="song-info">

                    <h4>Believer</h4>

                    <p>Imagine Dragons</p>

                </div>

            </li>

        </ul>

    </div>

    <!-- Favourite -->

    <div class="favorite">

        <i class="fa-solid fa-heart"></i>

        <span>Favourite Songs</span>

    </div>

</aside>

        <!-- Main Player -->

        <main class="player">

        </main>

    </div>

    <script src="script.js"></script>

</body>

</html>
