<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Music Player</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Font Awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <!-- Sidebar -->

      <aside class="sidebar">
        <!-- Logo -->

        <div class="logo">
          <i class="fa-solid fa-music"></i>

          <div>
            <h2>Melody Fun</h2>

            <p>Feel the Music</p>
          </div>
        </div>

        <!-- Playlist -->

        <div class="playlist">
          <h3>Playlist</h3>

          <ul class="song-list">
            <li class="song active">
              <img src="images/dilbar.png" alt="cover" />

              <div class="song-info">
                <h4>DILBAR</h4>

                <p>Neha Kakkar / IKKA / Divni Bhanushali  2018, 3min 4sec</p>
              </div>
            </li>

            <li class="song">
              <img src="/images/cover2.jpg" alt="cover" />

              <div class="song-info">
                <h4>Perfect</h4>

                <p>Ed Sheeran</p>
              </div>
            </li>

            <li class="song">
              <img src="/images/cover3.jpg" alt="cover" />

              <div class="song-info">
                <h4>Believer</h4>

                <p>Imagine Dragons</p>
              </div>
            </li>
          </ul>
        </div>

        <!-- Favourite -->

        <div class="favorite">
          <i class="fa-solid fa-heart"></i>

          <span>Favourite Songs</span>
        </div>
      </aside>

      <!-- Main Player -->
      <main class="player">
        <!-- Album Cover -->

        <div class="album">
          <img src="images/dilbar.png" alt="Album Cover" id="cover" />
        </div>

        <!-- Song Details -->

        <div class="song-details">
          <h1 id="title">DILBAR</h1>

          <p id="artist">The Weeknd</p>
        </div>

        <!-- Progress -->

        <div class="progress-area">
          <span id="current-time"> 0:00 </span>

          <input type="range" id="progress" min="0" max="100" value="0" />

          <span id="duration"> 3:20 </span>
        </div>

        <!-- Controls -->

        <div class="controls">
          <button id="prev">
            <i class="fa-solid fa-backward"></i>
          </button>

          <button id="play">
            <i class="fa-solid fa-play"></i>
          </button>

          <button id="next">
            <i class="fa-solid fa-forward"></i>
          </button>
        </div>

        <!-- Volume -->

        <div class="volume">
          <i class="fa-solid fa-volume-high"></i>

          <input type="range" id="volume" min="0" max="100" value="80" />
        </div>
      </main>
    </div>
    <audio id="audio"></audio>
    <script src="script.js"></script>
  </body>
</html>
